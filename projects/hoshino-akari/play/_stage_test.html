<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>立繪演出 v0 — 測試харness（非正式，可刪）</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 開發用測試頁：載入真正的 style.css / art.js / engine.js，但以 stub 資料驅動，
     不碰任何正式 data/*.js。驗證 pos/depth/motion/clear 與向後相容。完事後可刪。 -->
<div id="app">
  <section id="title" class="screen">
    <div class="title-art" id="titleArt"></div>
    <h1>演出測試</h1>
    <p class="subtitle">立繪演出 v0</p>
    <div class="title-menu">
      <button id="btnStart">開始測試</button>
      <button id="btnContinue">繼續<span id="contLabel"></span></button>
      <button id="btnGallery">回想室</button>
    </div>
    <p class="title-note">dev harness</p>
  </section>

  <section id="game" class="screen hidden">
    <div id="topbar">
      <button id="btnMenu" title="選單">≡</button>
      <span id="dayTag">Day 1</span>
      <div class="top-right">
        <button id="btnAuto" title="自動播放">▶ 自動</button>
        <button id="btnSkip" title="快進已讀">» 快進</button>
        <button id="btnGalleryG" title="回想室">圖鑑</button>
      </div>
    </div>
    <div id="stage">
      <div id="moodbg"></div>
      <div id="spriteLayer" class="hidden"></div>
      <div id="cgLayer" class="hidden"></div>
      <div id="sceneCard" class="hidden"></div>
      <div id="sceneTag" class="hidden"></div>
      <div id="snsLayer" class="hidden"></div>
      <div id="exprBadge" class="hidden"></div>
      <div id="seFlash"></div>
    </div>
    <div id="textbox">
      <div id="speaker" class="hidden"></div>
      <div id="dialogue"></div>
      <div id="advanceHint">▼</div>
    </div>
    <div id="choices" class="hidden"></div>
    <div id="menuModal" class="modal hidden">
      <div class="modal-box">
        <h3>選單</h3>
        <button id="mResume">回到遊戲</button>
        <button id="mGallery">回想室</button>
        <button id="mRestartDay">重玩本日</button>
        <button id="mTitle">回標題</button>
        <label class="dbg-toggle"><input type="checkbox" id="dbgChk"> 開發者模式</label>
        <div id="dbgPanel" class="hidden"></div>
      </div>
    </div>
  </section>

  <section id="gallery" class="screen hidden">
    <div id="topbar">
      <button id="gBack">← 返回</button><span>回想室</span><div class="top-right"></div>
    </div>
    <div class="gal-section"><h3>章節回想</h3><div id="galChapters" class="gal-grid"></div></div>
    <div class="gal-section"><h3>結局徽記</h3><div id="galEndings" class="gal-grid"></div></div>
    <div class="gal-section"><h3>四記憶錨點</h3><div id="galAnchors" class="gal-grid"></div></div>
    <div class="gal-section"><h3>暗號</h3><div id="galSigns" class="gal-grid"></div></div>
    <div class="gal-section"><h3>隱藏</h3><div id="galHidden" class="gal-grid"></div></div>
    <div id="galView" class="modal hidden"><div class="modal-box gal-view-box"><div id="galViewArt"></div><p id="galViewText"></p><button id="galViewClose">關閉</button></div></div>
  </section>
</div>

<!-- 真正的 art.js（提供 ART.title / end_* 徽記） -->
<script src="art.js"></script>
<!-- stub 資料：只為驅動 engine，不碰正式 data/*.js -->
<script>
window.HOSHINO = { days: {}, endings: {}, meta: {}, chapters: {} };
window.HOSHINO.meta = {
  gameId: "stage-test", version: "0", schemaVersion: 1, dayCount: 1,
  days: { 1: { title: "演出測試", subtitle: "pos / depth / motion / clear" } },
  names: { akari: { label: "星野灯", cls: "akari" }, me: { label: "我", cls: "me" }, manager: { label: "經理人", cls: "manager" }, narration: { label: "", cls: "narration" } },
  initScores: { affection: 0, distance: 0, awareness: 0, regret: 0 },
  judge() { return "quiet_normal"; },
  endingMeta: {
    warm_true: { badge: "end_warm", title: "暖", note: "" },
    quiet_normal: { badge: "end_quiet", title: "測試結束", note: "" },
    bitter: { badge: "end_bitter", title: "苦", note: "" },
    hidden_pov: { badge: "end_hidden", title: "隱", note: "" },
  },
  gallery: { anchors: [], signs: [], hidden: [] },
};
window.HOSHINO.assets = {
  enabled: { bgm: false, se: false },
  characters: {
    akari: {
      "中性": "assets/characters/akari_cb_neutral.png",
      "微笑": "assets/characters/akari_cb_smile.png",
      "為難": "assets/characters/akari_cb_troubled.png",
      "@masks": { "口罩": "assets/characters/akari_mask_on_overlay.png", "半罩": "assets/characters/akari_mask_half_overlay.png" },
    },
  },
  cg: {}, background: {}, bgm: {}, se: {},
};
window.HOSHINO.endings = {
  quiet_normal: [{ type: "line", who: "narration", text: "（測試結束）" }],
};
window.HOSHINO.days[1] = [
  { type: "scene", place: "演出測試", time: "", mood: "night" },
  // ── 本次新增的兩個重點 ──
  { type: "line", who: "narration", text: "（先點一下，看她從畫面外衝進來撞畫面）" },
  { type: "line", who: "akari", text: "Ａ rush_in：衝進來撞畫面＋震動！", expr: "中性", mask: "口罩", motion: "rush_in", shake: true, se: "bump", pause: 0.6 },
  { type: "line", who: "narration", text: "（再點，看她慢慢走近你面前；速度可由劇本 motionDur 調）" },
  { type: "line", who: "akari", text: "Ｂ walk_in：慢慢走近你面前，鏡頭拉到她的臉、頭部幾乎佔滿（預設 2.6 秒）", expr: "中性", mask: "口罩", motion: "walk_in", pause: 3 },
  { type: "line", who: "akari", text: "Ｂ2 只換表情（depth:closeup）→ 維持大特寫，變成微笑、大小不變", expr: "微笑", mask: "口罩", depth: "closeup" },
  { type: "line", who: "akari", text: "Ｂ3 再換一個表情，仍維持大特寫（depth:closeup）", expr: "為難", mask: "口罩", depth: "closeup" },
  { type: "line", who: "narration", text: "（下一句不帶 depth → 她就會回到原本大小）" },
  { type: "line", who: "akari", text: "Ｂ4 回到原本大小（沒帶 depth ＝ 還原）", expr: "中性", mask: "口罩" },
  { type: "line", who: "akari", text: "Ｃ walk_in ＋ motionDur:4.5（更慢的走近，逐句調速）", expr: "中性", mask: "口罩", motion: "walk_in", motionDur: 4.5, pause: 5 },
  { type: "line", who: "akari", text: "Ｄ depth near（加強版・靠近半步）", expr: "微笑", mask: "口罩", depth: "near" },
  { type: "line", who: "akari", text: "Ｅ depth far（加強版・站遠，明顯後退）", expr: "為難", mask: "口罩", depth: "far" },
  // ── 既有效果 ──
  { type: "line", who: "akari", text: "① fade_in 進場（淡入）", expr: "中性", mask: "口罩", motion: "fade_in" },
  { type: "line", who: "akari", text: "② slide_in_left（從左滑入）", expr: "中性", mask: "口罩", motion: "slide_in_left" },
  { type: "line", who: "akari", text: "③ slide_in_right（從右滑入）", expr: "中性", mask: "口罩", motion: "slide_in_right" },
  { type: "line", who: "akari", text: "④ step_in 靠近半步（depth near＋step_in）", expr: "微笑", mask: "口罩", depth: "near", motion: "step_in" },
  { type: "line", who: "akari", text: "⑤ step_back 退半步（depth far＋step_back）", expr: "為難", mask: "口罩", depth: "far", motion: "step_back" },
  { type: "line", who: "akari", text: "⑥ pos left（站左）", expr: "中性", mask: "口罩", pos: "left" },
  { type: "line", who: "akari", text: "⑦ pos right（站右）", expr: "中性", mask: "口罩", pos: "right" },
  { type: "line", who: "akari", text: "⑧ pos right ＋ depth far（疊加：translate+scale 不互相覆蓋）", expr: "中性", mask: "口罩", pos: "right", depth: "far" },
  { type: "line", who: "narration", text: "⑨ clear:true 乾淨退場（淡出）→", clear: true },
  { type: "line", who: "narration", text: "⑩ 退場後：立繪應已消失（此拍刻意無立繪）" },
  { type: "line", who: "akari", text: "⑪ 無演出欄位＝舊行為（瞬間置中、無動畫）", expr: "中性", mask: "口罩" },
  { type: "line", who: "narration", text: "測試完成。" },
];
</script>
<!-- 真正的 engine.js -->
<script src="engine.js"></script>
</body>
</html>
